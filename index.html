<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="showResult()">show data</button>
    <div class="info"></div>
    <p id="count"></p>
    
    <script>
         function showResult(){
            const id = "6997425dcd0b057e2aadc06a"
         const data = fetch(`http://localhost:3000/api/teachers/`).then((data)=>{
            const response = data.json();
            return response;
        }).then((data)=>{
            console.log(data);
            const container = document.querySelector(".info");
            let count = 0
           data.forEach((student)=>{
            container.innerHTML+=`
            <div style="display:flex;align-item:center; jsutify-content:center;">
                <p style="padding;10px">${student.first_name}</p>
                <p>${student.last_name}</p>
                <p>${student.email}</p>
                <button style="width:auto; padding:0px 10px; height:20px; background-color:red; color:white; border:none; border-radius:2px; cursor:pointer;"onclick="handledelete('${student._id}')">Delete</button>
                </div>
            `
            count++
           })
            
            document.getElementById('count').textContent = "total :"+count
            console.log(data)
        })
        .catch((err)=>{console.log(err)})
       }

       async function handledelete(id){
        try{
            const confromDelete = confirm("Are you sure for delete this teacher");
            if(!confromDelete) return


            await fetch(`http://localhost:3000/api/teachers/${id}`,{
                method:"DELETE"
            });
            alert("Teacher deleted successfully");
        }catch(err){
            console.log(err);
        }
       }
    </script>
</body>
</html>
